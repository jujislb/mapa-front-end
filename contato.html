<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juliana Bueno | Contatos</title>
    <link rel="stylesheet" href="css/estilo.css">
    <meta name="description" content="Entre em contato para projetos de vídeo, motion, 3D e design.">
    <script src="js/script.js" defer></script>
</head>

<body>
    <header>
        <!-- Cabeçalho / Menu de navegação -->
        <div class="container">
            <a href="index.html" class="logo">Juliana Bueno</a> <!-- Mudei o h1 para logo -->

            <!-- Botão Hamburguer -->
            <button id="btn-menu" aria-label="Abrir menu">Menu</button>

            <nav id="nav-principal">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="projeto.html">Projetos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>



    </header>

    <main>
        <!-- seção entre em contato -->
        <div class="container">
            <section class="contato">
                <h2>Entre em contato</h2>
                <form action="" method="post" class="formulario-contato">
                    <div class="campo">
                        <!--preencher nome-->
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Digitar seu nome" required>

                        <!--prencher email-->
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">

                        <!--preencher mensagem-->
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" name="mensagem" required minlength="10" rows="6"
                            placeholder="Escreva sua mensagem"></textarea>

                        <!--botão enviar-->
                        <button type="submit">Enviar</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

</body>

</html>
